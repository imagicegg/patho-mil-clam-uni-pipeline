<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字病理辅助诊断系统 - 静态原型 v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 模拟 H&E 染色底图 */
        .he-stain-bg {
            background-color: #fce7f3;
            background-image: radial-gradient(#db2777 1px, transparent 1px), radial-gradient(#db2777 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            opacity: 0.6;
        }

        /* 模拟 AI 注意力热力图 */
        .heatmap-overlay {
            background: radial-gradient(circle at 65% 55%, 
                rgba(220, 38, 38, 0.85) 0%, rgba(234, 88, 12, 0.7) 20%, 
                rgba(250, 204, 21, 0.5) 40%, rgba(56, 189, 248, 0.3) 60%, transparent 80%);
            mix-blend-mode: multiply;
            transition: opacity 0.4s ease-in-out;
        }

        .hidden-layer { opacity: 0; pointer-events: none; }
        
        /* 自定义滚动条使左侧边栏更清爽 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans text-slate-800 bg-slate-100 overflow-hidden">

    <!-- ================= 顶部导航栏 ================= -->
    <header class="bg-white shadow-sm border-b border-slate-200 px-6 py-3 flex justify-between items-center z-20">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-blue-600 rounded-md flex items-center justify-center text-white font-bold text-sm shadow-inner">AI</div>
            <h1 class="text-lg font-bold tracking-tight text-slate-900">数字病理辅助诊断系统</h1>
            <span class="bg-blue-50 text-blue-600 text-xs px-2 py-0.5 rounded-full border border-blue-200 ml-2 font-medium">Pro</span>
        </div>
        <div class="flex items-center gap-4 text-sm font-medium text-slate-600">
            <span>Dr. Wang Shuai</span>
            <div class="w-8 h-8 rounded-full bg-slate-200 border border-slate-300 flex items-center justify-center overflow-hidden">
                <svg class="w-5 h-5 text-slate-400" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"></path></svg>
            </div>
        </div>
    </header>

    <!-- ================= 主体工作区 (三栏布局) ================= -->
    <main class="flex-1 flex overflow-hidden">
        
        <!-- 【新增】左侧栏：文件管理与历史列表 -->
        <aside class="w-64 bg-white border-r border-slate-200 flex flex-col z-10 shadow-[4px_0_15px_-3px_rgba(0,0,0,0.02)]">
            <!-- 核心操作按钮 -->
            <div class="p-4 border-b border-slate-100">
                <button class="w-full bg-white hover:bg-blue-50 text-slate-700 hover:text-blue-700 border border-slate-300 hover:border-blue-300 font-medium py-2 px-4 rounded-lg flex items-center justify-center gap-2 transition-all shadow-sm">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 13h6m-3-3v6m5 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    打开本地切片
                </button>
            </div>
            
            <!-- 最近列表 -->
            <div class="flex-1 overflow-y-auto p-3">
                <div class="flex items-center justify-between mb-3 px-2">
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider">最近查看</h3>
                    <span class="text-[10px] bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded">16 项</span>
                </div>
                <ul class="space-y-1">
                    <!-- 选中状态 (Active) -->
                    <li>
                        <button class="w-full flex items-center gap-3 px-3 py-2.5 bg-blue-50 text-blue-700 rounded-md text-sm font-medium transition-colors border border-blue-100">
                            <div class="w-2 h-2 rounded-full bg-red-500 flex-shrink-0"></div> <!-- 红点代表有阳性特征 -->
                            <span class="truncate">tumor_001.tif</span>
                        </button>
                    </li>
                    <!-- 未选中状态 (Inactive) -->
                    <li>
                        <button class="w-full flex items-center gap-3 px-3 py-2.5 text-slate-600 hover:bg-slate-50 hover:text-slate-900 rounded-md text-sm transition-colors border border-transparent">
                            <div class="w-2 h-2 rounded-full bg-green-500 flex-shrink-0"></div> <!-- 绿点代表正常 -->
                            <span class="truncate">normal_001.tif</span>
                        </button>
                    </li>
                    <li>
                        <button class="w-full flex items-center gap-3 px-3 py-2.5 text-slate-600 hover:bg-slate-50 hover:text-slate-900 rounded-md text-sm transition-colors border border-transparent">
                            <div class="w-2 h-2 rounded-full bg-red-500 flex-shrink-0 opacity-40"></div>
                            <span class="truncate">tumor_002.tif</span>
                        </button>
                    </li>
                    <li>
                        <button class="w-full flex items-center gap-3 px-3 py-2.5 text-slate-600 hover:bg-slate-50 hover:text-slate-900 rounded-md text-sm transition-colors border border-transparent">
                            <div class="w-2 h-2 rounded-full bg-green-500 flex-shrink-0 opacity-40"></div>
                            <span class="truncate">normal_002.tif</span>
                        </button>
                    </li>
                </ul>
            </div>
        </aside>

        <!-- 中部：WSI 切片主视图区 -->
        <section class="flex-1 p-5 flex flex-col relative bg-slate-50/50">
            <!-- 视图控制栏 -->
            <div class="flex justify-between items-center mb-4">
                <div class="flex items-center gap-3">
                    <h2 class="text-lg font-semibold text-slate-800">视图工作区</h2>
                    <!-- 面包屑式的当前文件名 -->
                    <div class="flex items-center gap-2 text-sm font-mono text-slate-600 bg-white px-3 py-1 rounded-md border border-slate-200 shadow-sm">
                        <svg class="w-4 h-4 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                        tumor_001.tif
                    </div>
                </div>
                
                <!-- 热力图控制开关 -->
                <div class="flex items-center gap-3 bg-white px-3 py-1.5 rounded-lg border border-slate-200 shadow-sm">
                    <span class="text-sm font-medium text-slate-700">AI 关注度叠加 (Heatmap)</span>
                    <button id="heatmapToggle" class="relative inline-flex h-6 w-11 items-center rounded-full transition-colors focus:outline-none bg-blue-600">
                        <span id="toggleKnob" class="inline-block h-4 w-4 transform rounded-full bg-white transition-transform translate-x-6 shadow"></span>
                    </button>
                </div>
            </div>

            <!-- 切片画布 -->
            <div class="flex-1 bg-white rounded-xl border border-slate-300 overflow-hidden relative shadow-inner">
                <!-- 第一层：底层切片 -->
                <div class="absolute inset-0 he-stain-bg"></div>
                <!-- 第二层：AI 热力图叠层 -->
                <div id="heatmapLayer" class="heatmap-overlay absolute inset-0"></div>
                
                <!-- 底部辅助信息 -->
                <div class="absolute bottom-4 left-4 flex gap-2">
                    <div class="bg-slate-900/80 backdrop-blur text-white px-3 py-1.5 rounded text-xs font-mono shadow-lg">Zoom: 40x</div>
                    <div class="bg-slate-900/80 backdrop-blur text-white px-3 py-1.5 rounded text-xs font-mono shadow-lg">X: 2400 | Y: 1800</div>
                </div>
                <!-- 中心准星 -->
                <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 opacity-30 pointer-events-none">
                    <div class="w-8 h-px bg-slate-800 absolute top-1/2 -ml-4"></div>
                    <div class="h-8 w-px bg-slate-800 absolute left-1/2 -mt-4"></div>
                </div>
            </div>
        </section>

        <!-- 右侧：AI 诊断侧边栏 (保持原样结构) -->
        <aside class="w-80 bg-white border-l border-slate-200 flex flex-col shadow-[-4px_0_15px_-3px_rgba(0,0,0,0.05)] z-10">
            <div class="p-5 border-b border-slate-100">
                <h2 class="text-base font-semibold text-slate-800">AI 辅助诊断报告</h2>
            </div>
            <!-- 内容区 -->
            <div class="p-5 flex-1 overflow-y-auto space-y-5">
                <!-- 核心结论 -->
                <div class="bg-red-50 border border-red-200 rounded-xl p-4 shadow-sm">
                    <div class="flex items-center justify-between mb-1">
                        <span class="text-xs font-bold text-red-800 uppercase">综合判定</span>
                        <span class="flex h-2.5 w-2.5 relative"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-red-500"></span></span>
                    </div>
                    <div class="text-2xl font-extrabold text-red-600">阳性 (Tumor)</div>
                </div>
                <!-- 进度条指标 -->
                <div class="space-y-3">
                    <div>
                        <div class="flex justify-between text-xs mb-1">
                            <span class="text-slate-600">肿瘤检出概率</span>
                            <span class="font-bold text-slate-800">99.8%</span>
                        </div>
                        <div class="w-full bg-slate-100 rounded-full h-2"><div class="bg-red-500 h-2 rounded-full" style="width: 99.8%"></div></div>
                    </div>
                </div>
                <!-- 数据统计 -->
                <div class="space-y-2 pt-3 border-t border-slate-100">
                    <div class="flex justify-between items-center p-2 bg-slate-50 rounded border border-slate-200">
                        <span class="text-xs text-slate-600">处理图块</span><span class="font-mono text-xs font-semibold text-slate-800">14,205</span>
                    </div>
                    <div class="flex justify-between items-center p-2 bg-slate-50 rounded border border-slate-200">
                        <span class="text-xs text-slate-600">推理耗时</span><span class="font-mono text-xs font-semibold text-slate-800">1.25s</span>
                    </div>
                </div>
            </div>
            <!-- 导出按钮 -->
            <div class="p-4 border-t border-slate-200 bg-slate-50">
                <button class="w-full bg-slate-800 hover:bg-slate-900 text-white font-medium py-2.5 rounded-md text-sm transition-colors shadow">导出 PDF 报告</button>
            </div>
        </aside>
    </main>

    <script>
        const toggleBtn = document.getElementById('heatmapToggle');
        const toggleKnob = document.getElementById('toggleKnob');
        const heatmapLayer = document.getElementById('heatmapLayer');
        let isHeatmapOn = true;

        toggleBtn.addEventListener('click', () => {
            isHeatmapOn = !isHeatmapOn;
            if (isHeatmapOn) {
                toggleBtn.classList.replace('bg-slate-300', 'bg-blue-600');
                toggleKnob.classList.replace('translate-x-1', 'translate-x-6');
                heatmapLayer.classList.remove('hidden-layer');
            } else {
                toggleBtn.classList.replace('bg-blue-600', 'bg-slate-300');
                toggleKnob.classList.replace('translate-x-6', 'translate-x-1');
                heatmapLayer.classList.add('hidden-layer');
            }
        });
    </script>
</body>
</html>
